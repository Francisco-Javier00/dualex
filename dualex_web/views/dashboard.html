<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Gestión | DUALEX</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="icon" type="image/png" href="../public/img/LogoDualex.png">
</head>
<body>
    <header id="main-header">
        <div class="logo-container">
            <h1>DUALEX</h1>
        </div>
        <a href="profile.html" id="user-profile-link">
            <div class="user-console">
                <div class="user-meta">
                    <span class="email">Prisco.gmail.com</span>
                    <span class="role-tag">rol: coordinador</span>
                </div>
                <div class="avatar-circle">PR</div>
            </div>
        </a>
        <nav class="actions-nav">
                <button class="icon-btn" title="Centro de Ayuda">?</button>
                <button class="icon-btn" title="Cerrar Sesión">⏻</button>
            </nav>
        </div>
    </header>

    <main>
        <div id="dashboard-container">
            <header class="dashboard-header">
                <h2>PANEL DE GESTIÓN INTEGRAL</h2>
                <p>Selecciona una categoría para gestionar</p>
            </header>

            <section id="cards-layout">
                <!-- Profesores -->
                <article class="management-card" id="card-profesores">
                    <div class="card-media">
                        <img src="../public/img/teachers.png" alt="Gestión de Profesores">
                    </div>
                    <div class="card-info">
                        <h3>Profesores</h3>
                        <a href="teachers.html" class="enter-button">Entrar</a>
                    </div>
                </article>

                <!-- Empresas -->
                <article class="management-card" id="card-empresas">
                    <div class="card-media">
                        <img src="../public/img/companies.png" alt="Gestión de Empresas">
                    </div>
                    <div class="card-info">
                        <h3>Empresas</h3>
                        <a href="companies.html" class="enter-button">Entrar</a>
                    </div>
                </article>

                <!-- Ciclos -->
                <article class="management-card" id="card-ciclos">
                    <div class="card-media">
                        <img src="../public/img/cycles.png" alt="Gestión de Ciclos">
                    </div>
                    <div class="card-info">
                        <h3>Ciclos</h3>
                        <a href="cycleRegistration.html" class="enter-button">Entrar</a>
                    </div>
                </article>

                <!-- Cursos -->
                <article class="management-card" id="card-cursos">
                    <div class="card-media">
                        <img src="../public/img/courses.png" alt="Gestión de Cursos">
                    </div>
                    <div class="card-info">
                        <h3>Cursos</h3>
                        <a href="courses.html" class="enter-button">Entrar</a>
                    </div>
                </article>

                <!-- Módulos -->
                <article class="management-card" id="card-modulos">
                    <div class="card-media">
                        <img src="../public/img/modules.png" alt="Gestión de Módulos">
                    </div>
                    <div class="card-info">
                        <h3>Módulos</h3>
                        <a href="modules.html" class="enter-button">Entrar</a>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <footer id="main-footer">
        <div class="footer-logo">
            <img src="../public/img/LogoDualex.png" alt="Logo Escuela Dualex">
        </div>
        <p class="footer-text">Escuela Virgen de Guadalupe Fundación Loyola &copy; Todos los derechos reservados</p>
    </footer>
</body>
</html>
